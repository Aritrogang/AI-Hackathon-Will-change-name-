name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slides-app/package-lock.json
      - run: npm ci
        working-directory: slides-app
      - run: npm run build
        working-directory: slides-app
      - run: cp brief-idea.html slides-app/dist/brief-idea.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
